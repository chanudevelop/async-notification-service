spring:
  application:
    name: notification
  profiles:
    active: local
  jpa:
    open-in-view: false

notification:
  worker:
    batch-size: 10
    polling-interval-ms: 1000
  retry:
    enabled: true
    polling-interval-ms: 5000
    batch-size: 20
    base-delay-seconds: 10
    multiplier: 2
    max-delay-seconds: 300
    jitter-seconds: 5
  reaper:
    enabled: true
    polling-interval-ms: 60000
    stuck-threshold-seconds: 300
    batch-size: 50
